<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body style="background-color: #9a8282;">
    Value	State	Description
 0	UNSENT	Client has been created. open() not called yet.
 1	OPENED	open() has been called.
 2	HEADERS_RECEIVED	send() has been called, and headers and status  are available.
 3	LOADING	Downloading; responseText holds partial data.
 4	DONE	The operation is complete.

<button id="loadData">show User followers/image</button>

<div id="card" style="border:1px solid black; width:250px; padding:10px; margin-top:20px;">
    <img id="avatar" width="200">
    <h3 id="followers"></h3>
</div>

<script src="script.js"></script>

</body>

<script> 
   const btn = document.getElementById("loadData")
   btn.style.backgroundColor = "pink"
   btn.style.color = "white"
   btn.style.padding = "10px 20px"
   btn.style.border = "none"
   btn.style.borderRadius = "8px"
   btn.style.curser = "pointer"
   
   const requestUrl = 'https://api.github.com/users/hiteshchoudhary'
   document.getElementById("loadData").addEventListener("click", function(){
   const XHR = new XMLHttpRequest();
   XHR.open('get',requestUrl)
     XHR.onreadystatechange = function(){
     console.log(XHR.readyState);   
     if (XHR.readyState === 4){
    const data = JSON.parse(this.responseText)
         console.log(typeof data);
         console.log(data.followers);
         
         document.getElementById("avatar").src = data.avatar_url
        document.getElementById("followers").innerText = 
        "Followers : " + data.followers
        }
     
     }
   
   XHR.send()})
</script>
</html>
